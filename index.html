<!DOCTYPE html>
<html>
<head>
<title>AI Assignment Generator</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
padding:20px;
background:#f5f6fa;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:700px;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0px 4px 12px rgba(0,0,0,0.1);
}

h2{
margin-top:0;
text-align:center;
}

.input-group{
display:flex;
gap:10px;
margin-top:15px;
}

input{
flex:1;
padding:12px;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
padding:12px 18px;
cursor:pointer;
background:#007BFF;
color:white;
border:none;
border-radius:6px;
font-size:16px;
}

button:hover{
background:#0056b3;
}

#loading{
margin-top:15px;
color:#007BFF;
font-weight:bold;
}

#result{
margin-top:20px;
background:#fafafa;
padding:20px;
border-radius:8px;
line-height:1.6;
}

/* Mobile responsive */
@media (max-width:600px){

.input-group{
flex-direction:column;
}

button{
width:100%;
}

}

</style>

</head>

<body>

<div class="container">

<h2>AI Assignment Generator</h2>

<div class="input-group">
<input id="topic" placeholder="Enter topic (Example: Soft Computing)">
<button onclick="generate()">Generate</button>
</div>

<div id="loading"></div>

<div id="result"></div>

</div>

<script>

async function generate(){

const topic = document.getElementById("topic").value;

if(!topic.trim()){
alert("Please enter a topic");
return;
}

document.getElementById("loading").innerText="Generating notes...";
document.getElementById("result").innerHTML="";

try{

const response = await fetch(
"https://n8ndev.nitco.io/webhook/generate-assignment",
{
method:"POST",
mode:"cors",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify({ topic })
});

if(!response.ok){
throw new Error("Request failed");
}

const data = await response.json();

document.getElementById("loading").innerText="";

const markdown = data.output;

const html = marked.parse(markdown);

document.getElementById("result").innerHTML = html;

}

catch(error){

document.getElementById("loading").innerText="";
document.getElementById("result").innerText="Error generating assignment.";

}

}

</script>

</body>
</html>
